<mat-card>
  <mat-card-header>
    <mat-card-title>{{ fee?.uso?.nombre }} — {{ fee?.userType?.nombre }}</mat-card-title>
    <mat-card-subtitle *ngIf="fee?.observaciones">{{ fee.observaciones }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <div class="actions">
      <button mat-raised-button color="primary" (click)="openAddAmount()">
        <mat-icon>add</mat-icon> Agregar monto por año
      </button>
    </div>

    <table mat-table [dataSource]="dataSource" class="mat-cell">

      <ng-container matColumnDef="vigencia">
        <th mat-header-cell *matHeaderCellDef> Año</th>
        <td mat-cell *matCellDef="let element">{{ element.vigencia }}</td>
      </ng-container>

      <ng-container matColumnDef="cuota">
        <th mat-header-cell *matHeaderCellDef> Monto</th>
        <td mat-cell *matCellDef="let element">{{ element.cuota | currency }}</td>
      </ng-container>

      <ng-container matColumnDef="observaciones">
        <th mat-header-cell *matHeaderCellDef> Observaciones</th>
        <td mat-cell *matCellDef="let element">{{ element.observaciones }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Acciones</th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button color="accent" (click)="openEditAmount(element)" title="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deactivateAmount(element)" title="Dar de baja">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayColumns"></tr>
    </table>

    <mat-paginator [pageSizeOptions]="[10, 20, 30]" showFirstLastButtons></mat-paginator>
  </mat-card-content>
</mat-card>
