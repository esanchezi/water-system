<mat-card>
  <h2 class="alinear">Cuotas</h2>
  <mat-card-header>
    <div class="actions">
      <button mat-raised-button color="primary" (click)="openCreate()">
        <mat-icon>add</mat-icon> Nueva Cuota
      </button>
    </div>
  </mat-card-header>

  <mat-card-content>
    <table mat-table [dataSource]="dataSource" class="mat-cell">

      <ng-container matColumnDef="uso">
        <th mat-header-cell *matHeaderCellDef> Uso</th>
        <td mat-cell *matCellDef="let element">{{ element.uso?.nombre }}</td>
      </ng-container>

      <ng-container matColumnDef="userType">
        <th mat-header-cell *matHeaderCellDef> Tipo de usuario</th>
        <td mat-cell *matCellDef="let element">{{ element.userType?.nombre }}</td>
      </ng-container>

      <ng-container matColumnDef="totalMontos">
        <th mat-header-cell *matHeaderCellDef> Años cargados</th>
        <td mat-cell *matCellDef="let element">{{ element.amount?.length || 0 }}</td>
      </ng-container>

      <ng-container matColumnDef="ultimoMonto">
        <th mat-header-cell *matHeaderCellDef> Último monto</th>
        <td mat-cell *matCellDef="let element">
          <ng-container *ngIf="ultimoMonto(element) as ultimo; else sinMonto">
            {{ ultimo.cuota | currency }} ({{ ultimo.vigencia }})
          </ng-container>
          <ng-template #sinMonto>Sin montos</ng-template>
        </td>
      </ng-container>

      <ng-container matColumnDef="observaciones">
        <th mat-header-cell *matHeaderCellDef> Observaciones</th>
        <td mat-cell *matCellDef="let element">{{ element.observaciones }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Acciones</th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button color="primary" (click)="goToDetail(element)" title="Ver montos por año">
            <mat-icon>calendar_month</mat-icon>
          </button>
          <button mat-icon-button color="accent" (click)="openEdit(element)" title="Editar">
            <mat-icon>edit</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayColumns"></tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
  </mat-card-content>
</mat-card>
