<mat-card>
    <h2 class="alinear">Personas</h2>
    <mat-card-header>
        <div>
            <mat-form-field hintLabel="Nombre" appearance="fill">
                <mat-label>Buscar por nombre</mat-label>
                <input matInput #nombre >
            </mat-form-field>
        </div>
        <div>
            <mat-form-field hintLabel="Apellido" appearance="fill">
                <mat-label>Buscar por app</mat-label>
                <input matInput #app >
            </mat-form-field>
        </div>
        <div>
            <mat-form-field hintLabel="Calle" appearance="fill">
                <mat-label>Buscar Calle</mat-label>
                <input matInput #calle >
            </mat-form-field>
        </div>
    </mat-card-header>

    <div mat-card-image></div>
    <mat-card-content>
        <table mat-table [dataSource]="dataSource" class="mat-cell">
            <!--Id column-->
            <ng-container matColumnDef="nombre">
                <th mat-header-cell *matHeaderCellDef> Nombre</th>
                <td mat-cell *matCellDef="let element" >{{element.nombre}} {{element.nombre2}} {{element.app}} {{element.apm}}</td>
            </ng-container>

            <!--description column-->
            <ng-container matColumnDef="observaciones">
                <th mat-header-cell *matHeaderCellDef> Observaciones</th>
                <td mat-cell *matCellDef="let element">{{element.observaciones}}</td>
            </ng-container>

            <!--actions column-->
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef> Acciones</th>
                <td mat-cell *matCellDef="let element; let i = index;" >
                    <button mat-icon-button color="accent" (click)="edit(element)">
                        <mat-icon aria-label="Edit">edit</mat-icon>
                    </button>
                    <button mat-icon-button color="accent">
                        <mat-icon aria-label="Delete">delete</mat-icon>
                    </button>
                </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="displayColumns"></tr>
            <tr mat-row *matRowDef="let row; columns:displayColumns"></tr>
        </table>
        <mat-paginator [pageSizeOptions]="[5,10,20]" showFirstLastButtons=""></mat-paginator>
    </mat-card-content>
</mat-card>
