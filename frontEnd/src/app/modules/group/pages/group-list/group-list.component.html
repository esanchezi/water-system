<mat-card>
    <h2 class="alinear">Grupos</h2>
    <div mat-card-image></div>
    <mat-card-header>
        <div>
            <mat-form-field appearance="fill">
                <mat-label>Buscar por nombre o apellido</mat-label>
                <input matInput (keyup)="applyNombreFilter($event)" placeholder="Escribe nombre o apellido...">
            </mat-form-field>
        </div>
    </mat-card-header>
    <mat-card-content>
        <table mat-table [dataSource]="dataSource" class="mat-cell">
            <ng-container matColumnDef="grupoId">
                <th mat-header-cell *matHeaderCellDef> Id Grupo</th>
                <td mat-cell *matCellDef="let element" >{{element.grupoId}}</td>
            </ng-container>
            <ng-container matColumnDef="nombre">
                <th mat-header-cell *matHeaderCellDef> Nombre</th>
                <td mat-cell *matCellDef="let element" >{{element.nombre}}</td>
            </ng-container>
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef> Acciones</th>
                <td mat-cell *matCellDef="let element; let i = index;" >
                    <button mat-icon-button color="accent" (click)="edit(element)">
                        <mat-icon aria-label="Edit">edit</mat-icon>
                    </button>
                    <button mat-icon-button color="accent">
                        <mat-icon aria-label="Delete">delete</mat-icon>
                    </button>
                </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="displayColumns"></tr>
            <tr mat-row *matRowDef="let row; columns:displayColumns"></tr>
        </table>
        <mat-paginator [pageSizeOptions]="[5,10,20]" showFirstLastButtons=""></mat-paginator>
    </mat-card-content>
</mat-card>
