<h2 mat-dialog-title>{{ isEdit ? 'Editar Catálogo' : 'Nuevo Catálogo' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="form-container">

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Clave</mat-label>
      <input matInput formControlName="clave" placeholder="Ej. ZONAS_CASA" />
      <mat-hint>Solo mayúsculas, números y guión bajo. No se puede cambiar después.</mat-hint>
      <mat-error *ngIf="form.get('clave')?.hasError('required')">
        La clave es requerida
      </mat-error>
      <mat-error *ngIf="form.get('clave')?.hasError('pattern')">
        Solo mayúsculas, números y guión bajo (ej. ZONAS_CASA)
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="nombre" placeholder="Nombre del catálogo" />
      <mat-error *ngIf="form.get('nombre')?.hasError('required')">
        El nombre es requerido
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Descripción</mat-label>
      <textarea matInput formControlName="descripcion" rows="3"
                placeholder="Descripción del catálogo"></textarea>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancelar</button>
  <button mat-raised-button color="primary"
          (click)="save()"
          [disabled]="form.invalid || saving">
    <mat-icon>save</mat-icon>
    {{ saving ? 'Guardando...' : 'Guardar' }}
  </button>
</mat-dialog-actions>
